AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudVault File Manager - S3, Lambda, EventBridge'

Parameters:
  BucketName:
    Type: String
    Description: Globally unique S3 bucket name (e.g. cloudvault-uploads-YOURNAME)
  WebhookUrl:
    Type: String
    Description: Rails callback URL for Lambda to post processing results
    Default: http://YOUR_EC2_PUBLIC_IP/api/v1/processing/webhook
  LambdaWebhookSecret:
    Type: String
    NoEcho: true
    Description: Shared secret for Lambda webhook authentication

Resources:
  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3ReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:HeadObject]
                Resource: !Sub '${UploadBucket.Arn}/*'

  FileProcessor:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: cloudvault-file-processor
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      Environment:
        Variables:
          WEBHOOK_URL: !Ref WebhookUrl
          WEBHOOK_SECRET: !Ref LambdaWebhookSecret
      Code:
        ZipFile: |
          import json, boto3, uuid, urllib.request, logging
          from datetime import datetime
          import os
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          s3 = boto3.client('s3')
          def lambda_handler(event, context):
              logger.info(f"Event: {json.dumps(event)}")
              try:
                  bucket = event['Records'][0]['s3']['bucket']['name']
                  key = event['Records'][0]['s3']['object']['key']
                  logger.info(f"Processing s3://{bucket}/{key}")
                  resp = s3.head_object(Bucket=bucket, Key=key)
                  file_size = resp['ContentLength']
                  file_size_mb = round(file_size / (1024*1024), 2)
                  result = {
                      'file_key': key, 'file_size_mb': file_size_mb,
                      'file_size': file_size, 'status': 'processed',
                      'processing_id': str(uuid.uuid4()),
                      'processed_at': datetime.utcnow().isoformat()
                  }
                  logger.info(f"Result: {json.dumps(result)}")
                  webhook_url = os.environ.get('WEBHOOK_URL')
                  webhook_secret = os.environ.get('WEBHOOK_SECRET')
                  if webhook_url and webhook_secret:
                      payload = json.dumps({'s3_key': key, 'result': result}).encode()
                      req = urllib.request.Request(
                          webhook_url, data=payload,
                          headers={'Content-Type': 'application/json',
                                   'X-Lambda-Webhook-Secret': webhook_secret},
                          method='POST')
                      resp = urllib.request.urlopen(req, timeout=10)
                      logger.info(f"Webhook status: {resp.status}")
                  return {'statusCode': 200, 'body': json.dumps(result)}
              except Exception as e:
                  logger.error(f"Error: {str(e)}", exc_info=True)
                  return {'statusCode': 500, 'body': json.dumps({'error': str(e)})}

  EventRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt FileProcessor.Arn

  S3UploadRule:
    Type: AWS::Events::Rule
    Properties:
      Name: cloudvault-s3-upload-rule
      State: ENABLED
      EventPattern:
        source: [aws.s3]
        detail-type: [Object Created]
        detail:
          bucket:
            name: [!Ref BucketName]
      Targets:
        - Arn: !GetAtt FileProcessor.Arn
          RoleArn: !GetAtt EventRole.Arn

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FileProcessor
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt S3UploadRule.Arn

Outputs:
  BucketName:
    Value: !Ref UploadBucket
  LambdaArn:
    Value: !GetAtt FileProcessor.Arn
